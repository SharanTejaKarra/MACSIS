llm:
  provider: "ollama"          # "ollama" for local or "openai" for cloud
  model: "qwen3:8b"           # ollama: qwen3:8b | openai: gpt-4o-mini
  temperature: 0.1
  max_tokens: 4096

langfuse:
  enabled: true

tools:
  latency_range: [0.1, 0.5]
  failure_rate: 0.05

retry:
  max_retries: 2
  backoff_seconds: 1.0

logging:
  level: "INFO"
  format: "structured"
